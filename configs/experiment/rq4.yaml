# RQ4: Do structure-aware retrieval tools (section index, terminology
# mapping) improve the agent's effectiveness on enterprise documents?
#
# Compares: Full tools / w/o section_index / w/o term_index / w/o both
# Tests C3's contribution for structured document navigation.
#
# NOTE: Run with --dataset financebench only.
# Multi-hop QA datasets (HotpotQA, 2Wiki, MuSiQue) have flat structure
# (1 section per source), making structure tools ineffective.
# FinanceBench SEC filings have multi-page/section structure where
# section_index and term_index provide meaningful navigation.

name: "RQ4: Structure-Aware Tools"
description: >
  Evaluate the impact of structure-aware retrieval tools (section index
  and terminology mapping) on agent performance with enterprise documents.

variants:
  - name: Full Tools
    pipeline: agentic
    experiment:
      enable_agentic_refinement: true

  - name: w/o Section Index
    pipeline: agentic
    experiment:
      enable_agentic_refinement: true
    agent:
      enabled_tools:
        - search
        - decompose
        - terminology
        - evaluate
        - inspect
        - calculate

  - name: w/o Terminology
    pipeline: agentic
    experiment:
      enable_agentic_refinement: true
    agent:
      enabled_tools:
        - search
        - decompose
        - structure
        - evaluate
        - inspect
        - calculate

  - name: w/o Structure Tools
    pipeline: agentic
    experiment:
      enable_agentic_refinement: true
    agent:
      enabled_tools:
        - search
        - decompose
        - evaluate
        - inspect
        - calculate
