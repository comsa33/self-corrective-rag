# RQ1: Does ReAct-based agentic refinement improve answer quality
# compared to fixed-loop refinement and single-pass baselines?
#
# Compares: Naive / CRAG / Single-Pass / Loop (C1-C5) / Agentic (ReAct)
# Expected: Agentic >= Loop > Single-Pass > CRAG > Naive

name: "RQ1: Agentic vs Baselines"
description: >
  Compare ReAct-based agentic retrieval refinement against for-loop
  refinement and single-pass baselines on answer quality metrics.

variants:
  - name: Naive RAG
    pipeline: naive

  - name: CRAG Replica
    pipeline: crag

  - name: Single-Pass
    pipeline: loop
    experiment:
      enable_iteration: false
      enable_agent_routing: false

  - name: Loop Refinement
    pipeline: loop
    experiment:
      enable_agent_routing: false

  - name: Agentic (ReAct)
    pipeline: agentic
    experiment:
      enable_agentic_refinement: true
      enable_agent_routing: false
    agent:
      # For multi-hop QA: only core tools (structure/terminology useless on Wikipedia)
      # For FinanceBench: override with enabled_tools: null (all tools)
      enabled_tools:
        - search
        - decompose
        - evaluate
        - calculate
