# RQ3: Does 4-dimensional quality assessment as an agent tool
# improve the agent's decision-making compared to simpler evaluation?
#
# Compares: Agent + 4D eval tool / Agent + 1D eval tool / Agent w/o eval tool
# Tests C2's contribution when used as an agent-accessible tool.

name: "RQ3: 4D Evaluation as Agent Tool"
description: >
  Compare the effect of multi-dimensional quality assessment as an
  agent-accessible tool on decision-making and answer quality.

variants:
  - name: Agent + 4D Eval Tool
    pipeline: agentic
    experiment:
      enable_agentic_refinement: true
      enable_4d_evaluation: true

  - name: Agent + 1D Eval Tool
    pipeline: agentic
    experiment:
      enable_agentic_refinement: true
      enable_4d_evaluation: false

  - name: Agent w/o Eval Tool
    pipeline: agentic
    experiment:
      enable_agentic_refinement: true
    agent:
      enabled_tools:
        - search
        - decompose
        - structure
        - terminology
        - inspect
        - calculate
